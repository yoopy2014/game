<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3D/2Dサンズ風・同期スクロールレース</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        /* ゲームのメインステージ */
        #game-stage {
            position: relative;
            width: 800px;
            height: 400px;
            border: 4px solid #fff;
            background-color: #000;
            overflow: hidden;
        }
        /* スクロール感を出すための背景のライン */
        .bg-line {
            position: absolute;
            height: 2px;
            background-color: #333;
            width: 100px;
        }
        /* プレイヤー（ソウル風の四角） */
        .player {
            position: absolute;
            width: 20px;
            height: 20px;
            z-index: 10;
        }
        /* サンズの攻撃：骨 */
        .bone {
            position: absolute;
            width: 15px;
            background-color: #fff;
            border-radius: 4px;
            z-index: 5;
        }
        /* サンズの攻撃：ブラスターのレーザー */
        .laser {
            position: absolute;
            left: 0;
            width: 800px;
            background-color: #fff; /* 白い極太ビーム */
            border-top: 4px solid #00f; /* サンズ風に青と黄色の縁取り */
            border-bottom: 4px solid #f00;
            z-index: 6;
            opacity: 0; /* 最初は透明（予告線用） */
            transition: opacity 0.1s;
        }
    </style>
</head>
<body>

    <h1>3D/2D SANS SPEEDRUN</h1>
    <div id="game-stage"></div>

    <script>
        // 1. --- Cloudflare Workersへの接続情報 ---
        const WorkersURL = "game.yoopy2014.workers.dev"; 

        // 2. --- ゲームの設定と状態 ---
        const myId = "player_" + Math.floor(Math.random() * 10000);
        const myColor = '#' + Math.floor(Math.random()*16777215).toString(16);
        let myPos = { x: 100, y: 190 };
        const SPEED = 6;
        const keys = {};
        const obstacles = [];
        const bgLines = [];
        let lasers = []; // レーザー管理用
        let gameTick = 0;
        let ws = null; 
        let stage = null; 

        // 3. --- 全てのロードが完了してから安全にスタート ---
        window.onload = function() {
            stage = document.getElementById("game-stage");
            
            // 背景の疑似スクロール線の初期化
            for(let i=0; i<15; i++) {
                createBGLine(Math.random() * 800);
            }

            // キーボード入力の監視
            window.addEventListener("keydown", (e) => { keys[e.key] = true; });
            window.addEventListener("keyup", (e) => { keys[e.key] = false; });

            // 通信サーバーへの接続
            connectToWebSocket();

            // ゲームループ開始
            gameLoop();
        };

        // 4. --- 通信サーバーとの接続＆自動再接続 ---
        function connectToWebSocket() {
            ws = new WebSocket("wss://" + WorkersURL + "/ws");

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.type === "move") {
                    let p = document.getElementById(data.id);
                    if (!p) {
                        p = document.createElement("div");
                        p.id = data.id;
                        p.className = "player";
                        p.style.backgroundColor = data.color;
                        stage.appendChild(p);
                    }
                    p.style.left = data.x + "px";
                    p.style.top = data.y + "px";
                }
            };

            ws.onclose = () => {
                console.log("再接続中...");
                setTimeout(connectToWebSocket, 2000);
            };
        }

        // --- 背景のライン生成 ---
        function createBGLine(startX) {
            const line = document.createElement("div");
            line.className = "bg-line";
            line.style.left = startX + "px";
            line.style.top = Math.random() * 400 + "px";
            stage.appendChild(line);
            bgLines.push({ element: line, x: startX, speed: Math.random() * 4 + 2 });
        }

        // --- 5. メインゲームループ ---
        function gameLoop() {
            gameTick++;
            let moved = false;

            // プレイヤーの移動
            if (keys["ArrowUp"] || keys["w"]) { myPos.y -= SPEED; moved = true; }
            if (keys["ArrowDown"] || keys["s"]) { myPos.y += SPEED; moved = true; }
            if (keys["ArrowLeft"] || keys["a"]) { myPos.x -= SPEED; moved = true; }
            if (keys["ArrowRight"] || keys["d"]) { myPos.x += SPEED; moved = true; }

            // 画面外ブレーキ
            if (myPos.x < 0) myPos.x = 0; if (myPos.x > 780) myPos.x = 780;
            if (myPos.y < 0) myPos.y = 0; if (myPos.y > 380) myPos.y = 380;

            // 自分の位置を画面に反映
            let myDiv = document.getElementById(myId);
            if (!myDiv) {
                myDiv = document.createElement("div");
                myDiv.id = myId;
                myDiv.className = "player";
                myDiv.style.backgroundColor = myColor;
                myDiv.style.border = "2px solid #fff"; 
                stage.appendChild(myDiv);
            }
            myDiv.style.left = myPos.x + "px";
            myDiv.style.top = myPos.y + "px";

            // 位置を全員に同期
            if (moved && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: "move", id: myId, color: myColor, x: myPos.x, y: myPos.y }));
            }

            // 背景スクロール
            bgLines.forEach(line => {
                line.x -= line.speed;
                if (line.x < -100) { line.x = 800; line.style.top = Math.random() * 400 + "px"; }
                line.element.style.left = line.x + "px";
            });

            // 【タイムライン攻撃】一定の間隔で骨を自動生成
            if (gameTick % 40 === 0) {
                createBone();
            }

            // 【タイムライン攻撃】120フレーム（約2秒）ごとにブラスターのレーザーを撃つ
            if (gameTick % 120 === 0) {
                triggerLaser();
            }

            // 骨の移動と当たり判定
            obstacles.forEach((bone, index) => {
                bone.x -= 5; 
                bone.element.style.left = bone.x + "px";

                if (bone.x < myPos.x + 20 && bone.x + 15 > myPos.x &&
                    bone.y < myPos.y + 20 && bone.y + bone.h > myPos.y) {
                    hitPenalty(myDiv);
                }

                if (bone.x < -20) {
                    bone.element.remove();
                    obstacles.splice(index, 1);
                }
            });

            // レーザーの当たり判定と寿命管理
            lasers.forEach((laser, index) => {
                // 警告時間が終わり、実際にビームが発射されている時（isActive）だけ当たり判定
                if (laser.isActive) {
                    if (myPos.y + 20 > laser.y && myPos.y < laser.y + laser.h) {
                        hitPenalty(myDiv);
                    }
                }
                
                // 発射して15フレーム（約0.25秒）で消滅
                laser.life--;
                if (laser.life <= 0) {
                    laser.element.remove();
                    lasers.splice(index, 1);
                }
            });

            requestAnimationFrame(gameLoop);
        }

        // --- 骨の生成 ---
        function createBone() {
            const bone = document.createElement("div");
            bone.className = "bone";
            const isTop = Math.random() > 0.5;
            const height = Math.random() * 150 + 50; 
            const yPos = isTop ? 0 : (400 - height);

            bone.style.height = height + "px";
            bone.style.top = yPos + "px";
            bone.style.left = "800px";
            stage.appendChild(bone);

            obstacles.push({ element: bone, x: 800, y: yPos, h: height });
        }

        // --- ガスターブラスター（レーザー）の発射演出 ---
        function triggerLaser() {
            const laser = document.createElement("div");
            laser.className = "laser";
            
            const height = 60; // レーザーの太さ
            const yPos = Math.random() * (400 - height); // ランダムな高さに発射

            laser.style.height = height + "px";
            laser.style.top = yPos + "px";
            stage.appendChild(laser);

            const laserObj = { element: laser, y: yPos, h: height, isActive: false, life: 45 }; // トータル寿命45フレーム
            lasers.push(laserObj);

            // 1. まず赤色のうっすらした予告線を出す（本家サンズ戦の演出！）
            laser.style.opacity = "0.2";
            laser.style.backgroundColor = "#f00";

            // 2. 0.5秒後（30フレーム後）に、本発射（極太の白ビームに変化！）
            setTimeout(() => {
                laserObj.isActive = true;
                laser.style.opacity = "1";
                laser.style.backgroundColor = "#fff";
            }, 500);
        }

        // --- ダメージを受けた時のペナルティ処理 ---
        function hitPenalty(div) {
            myPos = { x: 100, y: 190 }; // 初期位置に戻される
            div.style.backgroundColor = "#f00"; 
            setTimeout(() => { div.style.backgroundColor = myColor; }, 200);
        }
    </script>
</body>
</html>
