<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D/2Dサンズ風・同期スクロールレース</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            touch-action: none; 
        }
        #game-stage {
            position: relative;
            width: 800px;
            height: 400px;
            border: 4px solid #fff;
            background-color: #000;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent; 
        }
        .bg-line {
            position: absolute;
            height: 2px;
            background-color: #333;
            width: 100px;
        }
        .player {
            position: absolute;
            width: 20px;
            height: 20px;
            z-index: 10;
        }
        .bone {
            position: absolute;
            width: 15px;
            background-color: #fff;
            border-radius: 4px;
            z-index: 5;
        }
        .laser {
            position: absolute;
            left: 0;
            width: 800px;
            background-color: #fff;
            border-top: 4px solid #00f;
            border-bottom: 4px solid #f00;
            z-index: 6;
            opacity: 0;
            transition: opacity 0.1s;
        }
    </style>
</head>
<body>

    <h1 style="font-size: 24px; margin-bottom: 10px;">3D/2D SANS SPEEDRUN</h1>
    <p style="margin: 0 0 10px 0; color: #aaa; font-size: 14px;">PC: 矢印キー/WASD | スマホ: 画面タッチした場所へ移動</p>
    <div id="game-stage"></div>

    <script>
        const WorkersURL = "game.yoopy2014.workers.dev"; 

        const myId = "player_" + Math.floor(Math.random() * 10000);
        const myColor = '#' + Math.floor(Math.random()*16777215).toString(16);
        let myPos = { x: 100, y: 190 };
        let lastSentPos = { x: 0, y: 0 }; // 無駄な通信を減らすための前回の座標保持
        const SPEED = 6;
        const keys = {};
        const obstacles = [];
        const bgLines = [];
        let lasers = []; 
        let gameTick = 0;
        let ws = null; 
        
        const stage = document.getElementById("game-stage");

        // --- タッチ操作用のターゲット座標 ---
        let touchTarget = null; // 指が触れているステージ内の座標（nullの時はタッチされてない）

        // 背景のライン生成
        for(let i=0; i<15; i++) {
            const line = document.createElement("div");
            line.className = "bg-line";
            line.style.left = Math.random() * 800 + "px";
            line.style.top = Math.random() * 400 + "px";
            stage.appendChild(line);
            bgLines.push({ element: line, x: Math.random() * 800, speed: Math.random() * 4 + 2 });
        }

        // --- 操作イベント ---
        window.addEventListener("keydown", (e) => { keys[e.key] = true; });
        window.addEventListener("keyup", (e) => { keys[e.key] = false; });

        // タッチ位置を計算してターゲット座標を更新する関数
        function updateTouchTarget(e) {
            if (e.touches.length === 0) return;
            const touch = e.touches[0];
            const rect = stage.getBoundingClientRect();
            
            // ステージ内の基準座標に変換（ソウルの中心が指に集まるように-10調整）
            touchTarget = {
                x: (touch.clientX - rect.left) * (800 / rect.width) - 10,
                y: (touch.clientY - rect.top) * (400 / rect.height) - 10
            };
        }

        stage.addEventListener("touchstart", updateTouchTarget, { passive: true });
        stage.addEventListener("touchmove", updateTouchTarget, { passive: true });
        stage.addEventListener("touchend", () => { touchTarget = null; }, { passive: true });

        // --- 通信サーバーとの接続（低遅延対策） ---
        function connectToWebSocket() {
            try {
                if (ws) { ws.close(); }
                ws = new WebSocket("wss://" + WorkersURL + "/ws");

                // 送信バッファの詰まりを抑えるため、バイナリや不要なオーバーヘッドを減らす設定
                ws.binaryType = "arraybuffer"; 

                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    if (data.type === "move" && data.id !== myId) {
                        let p = document.getElementById(data.id);
                        if (!p) {
                            p = document.createElement("div");
                            p.id = data.id;
                            p.className = "player";
                            p.style.backgroundColor = data.color;
                            stage.appendChild(p);
                        }
                        p.style.left = data.x + "px";
                        p.style.top = data.y + "px";
                    }
                };

                ws.onclose = () => { setTimeout(connectToWebSocket, 1000); };
            } catch (e) {
                setTimeout(connectToWebSocket, 1000);
            }
        }

        connectToWebSocket();
        gameLoop();

        // --- メインゲームループ ---
        function gameLoop() {
            gameTick++;
            let moved = false;

            // ① キーボードによる移動
            if (keys["ArrowUp"] || keys["w"]) { myPos.y -= SPEED; moved = true; }
            if (keys["ArrowDown"] || keys["s"]) { myPos.y += SPEED; moved = true; }
            if (keys["ArrowLeft"] || keys["a"]) { myPos.x -= SPEED; moved = true; }
            if (keys["ArrowRight"] || keys["d"]) { myPos.x += SPEED; moved = true; }

            // ② スマホ：タッチ位置に向かって一定速度で追従するロジック（三角関数を使用）
            if (touchTarget) {
                const diffX = touchTarget.x - myPos.x;
                const diffY = touchTarget.y - myPos.y;
                const distance = Math.sqrt(diffX * diffX + diffY * diffY);

                // 指の位置にほぼ到達している場合はピタッと止める（ガタツキ防止）
                if (distance > SPEED) {
                    // ベクトルの正規化を用いて、どの方向に対しても常に「SPEED」と同じ速度で進む
                    myPos.x += (diffX / distance) * SPEED;
                    myPos.y += (diffY / distance) * SPEED;
                    moved = true;
                } else {
                    myPos.x = touchTarget.x;
                    myPos.y = touchTarget.y;
                    moved = true;
                }
            }

            // 画面外ブレーキ
            if (myPos.x < 0) myPos.x = 0; if (myPos.x > 780) myPos.x = 780;
            if (myPos.y < 0) myPos.y = 0; if (myPos.y > 380) myPos.y = 380;

            // 自分の位置を画面に反映
            let myDiv = document.getElementById(myId);
            if (!myDiv) {
                myDiv = document.createElement("div");
                myDiv.id = myId;
                myDiv.className = "player";
                myDiv.style.backgroundColor = myColor;
                myDiv.style.border = "2px solid #fff"; 
                stage.appendChild(myDiv);
            }
            myDiv.style.left = myPos.x + "px";
            myDiv.style.top = myPos.y + "px";

            // ③ 【タイムラグ大幅削減対策】
            // 座標に変化があった時、かつ前回の送信位置から1px以上動いている時だけパケットを飛ばす（通信の過密化・遅延を防ぐ）
            if (moved && ws && ws.readyState === WebSocket.OPEN) {
                if (Math.abs(myPos.x - lastSentPos.x) > 1 || Math.abs(myPos.y - lastSentPos.y) > 1) {
                    try {
                        ws.send(JSON.stringify({ type: "move", id: myId, color: myColor, x: Math.round(myPos.x), y: Math.round(myPos.y) }));
                        lastSentPos.x = myPos.x;
                        lastSentPos.y = myPos.y;
                    } catch(e) {}
                }
            }

            // 背景スクロール
            bgLines.forEach(line => {
                line.x -= line.speed;
                if (line.x < -100) { line.x = 800; line.element.style.top = Math.random() * 400 + "px"; }
                line.element.style.left = line.x + "px";
            });

            // 骨とレーザーの処理（変更なし）
            if (gameTick % 40 === 0) { createBone(); }
            if (gameTick % 120 === 0) { triggerLaser(); }

            obstacles.forEach((bone, index) => {
                bone.x -= 5; 
                bone.element.style.left = bone.x + "px";
                if (bone.x < myPos.x + 20 && bone.x + 15 > myPos.x &&
                    bone.y < myPos.y + 20 && bone.y + bone.h > myPos.y) {
                    hitPenalty(myDiv);
                }
                if (bone.x < -20) { bone.element.remove(); obstacles.splice(index, 1); }
            });

            lasers.forEach((laser, index) => {
                if (laser.isActive) {
                    if (myPos.y + 20 > laser.y && myPos.y < laser.y + laser.h) {
                        hitPenalty(myDiv);
                    }
                }
                laser.life--;
                if (laser.life <= 0) { laser.element.remove(); lasers.splice(index, 1); }
            });

            requestAnimationFrame(gameLoop);
        }

        function createBone() {
            const bone = document.createElement("div");
            bone.className = "bone";
            const isTop = Math.random() > 0.5;
            const height = Math.random() * 150 + 50; 
            const yPos = isTop ? 0 : (400 - height);
            bone.style.height = height + "px";
            bone.style.top = yPos + "px";
            bone.style.left = "800px";
            stage.appendChild(bone);
            obstacles.push({ element: bone, x: 800, y: yPos, h: height });
        }

        function triggerLaser() {
            const laser = document.createElement("div");
            laser.className = "laser";
            const height = 60; 
            const yPos = Math.random() * (400 - height); 
            laser.style.height = height + "px";
            laser.style.top = yPos + "px";
            stage.appendChild(laser);

            const laserObj = { element: laser, y: yPos, h: height, isActive: false, life: 45 }; 
            lasers.push(laserObj);

            laser.style.opacity = "0.2";
            laser.style.backgroundColor = "#f00";

            setTimeout(() => {
                laserObj.isActive = true;
                laser.style.opacity = "1";
                laser.style.backgroundColor = "#fff";
            }, 500);
        }

        function hitPenalty(div) {
            myPos = { x: 100, y: 190 }; 
            touchTarget = null; // タッチ中に当たったら一回ターゲットをクリアして指を離させる
            div.style.backgroundColor = "#f00"; 
            setTimeout(() => { div.style.backgroundColor = myColor; }, 200);
        }
    </script>
</body>
</html>
