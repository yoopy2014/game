<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3D/2Dサンズ風・同期スクロールレース</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        /* ゲームのメインステージ */
        #game-stage {
            position: relative;
            width: 800px;
            height: 400px;
            border: 4px solid #fff;
            background-color: #000;
            overflow: hidden;
        }
        /* スクロール感を出すための背景の「星や床のライン」 */
        .bg-line {
            position: absolute;
            height: 2px;
            background-color: #333;
            width: 100px;
        }
        /* プレイヤー（ソウル風の四角） */
        .player {
            position: absolute;
            width: 20px;
            height: 20px;
            z-index: 10;
        }
        /* サンズの攻撃：骨 */
        .bone {
            position: absolute;
            width: 15px;
            background-color: #fff; /* 白い骨 */
            border-radius: 4px;
            z-index: 5;
        }
    </style>
</head>
<body>

    <h1>3D/2D SANS SPEEDRUN</h1>
    <div id="game-stage"></div>

    <script>
        const myId = "player_" + Math.floor(Math.random() * 10000);
        const myColor = '#' + Math.floor(Math.random()*16777215).toString(16);

        // 先ほど確定したCloudflare WorkersのURLに接続！
        const ws = new WebSocket("wss://game.yoopy2014.workers.dev/ws");
        const stage = document.getElementById("game-stage");

        let myPos = { x: 100, y: 190 };
        const SPEED = 6;
        const keys = {};
        const players = {};
        let obstacles = [];
        let bgLines = [];
        let gameTick = 0;

        // --- 1. 背景の疑似スクロール線の初期化 ---
        for(let i=0; i<15; i++) {
            createBGLine(Math.random() * 800);
        }

        function createBGLine(startX) {
            const line = document.createElement("div");
            line.className = "bg-line";
            line.style.left = startX + "px";
            line.style.top = Math.random() * 400 + "px";
            stage.appendChild(line);
            bgLines.push({ element: line, x: startX, speed: Math.random() * 4 + 2 });
        }

        // --- 2. ネットワーク通信 ---
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            // プレイヤー位置の同期
            if (data.type === "move") {
                let p = document.getElementById(data.id);
                if (!p) {
                    p = document.createElement("div");
                    p.id = data.id;
                    p.className = "player";
                    p.style.backgroundColor = data.color;
                    stage.appendChild(p);
                }
                p.style.left = data.x + "px";
                p.style.top = data.y + "px";
            }
        };

        window.addEventListener("keydown", (e) => { keys[e.key] = true; });
        window.addEventListener("keyup", (e) => { keys[e.key] = false; });

        // --- 3. メインゲームループ ---
        function gameLoop() {
            gameTick++;
            let moved = false;

            // プレイヤー移動（上下左右）
            if (keys["ArrowUp"] || keys["w"]) { myPos.y -= SPEED; moved = true; }
            if (keys["ArrowDown"] || keys["s"]) { myPos.y += SPEED; moved = true; }
            if (keys["ArrowLeft"] || keys["a"]) { myPos.x -= SPEED; moved = true; }
            if (keys["ArrowRight"] || keys["d"]) { myPos.x += SPEED; moved = true; }

            // 画面外はみ出し防止
            if (myPos.x < 0) myPos.x = 0; if (myPos.x > 780) myPos.x = 780;
            if (myPos.y < 0) myPos.y = 0; if (myPos.y > 380) myPos.y = 380;

            // 自分自身の画面更新
            let myDiv = document.getElementById(myId);
            if (!myDiv) {
                myDiv = document.createElement("div");
                myDiv.id = myId;
                myDiv.className = "player";
                myDiv.style.backgroundColor = myColor;
                // 自分だと分かりやすいように枠線をつける
                myDiv.style.border = "2px solid #fff"; 
                stage.appendChild(myDiv);
            }
            myDiv.style.left = myPos.x + "px";
            myDiv.style.top = myPos.y + "px";

            // 位置をサーバー経由で全員に同期
            if (moved && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: "move", id: myId, color: myColor, x: myPos.x, y: myPos.y }));
            }

            // 背景のスクロール処理（左に流す）
            bgLines.forEach(line => {
                line.x -= line.speed;
                if (line.x < -100) { line.x = 800; line.style.top = Math.random() * 400 + "px"; }
                line.element.style.left = line.x + "px";
            });

            // 骨（障害物）の自動生成（一定間隔で右端から出現）
            if (gameTick % 40 === 0) {
                createBone();
            }

            // 骨の移動と当たり判定
            obstacles.forEach((bone, index) => {
                bone.x -= 5; // 骨の迫ってくるスピード
                bone.element.style.left = bone.x + "px";

                // 簡単な矩形当たり判定（自分と骨が重なったか）
                if (bone.x < myPos.x + 20 && bone.x + 15 > myPos.x &&
                    bone.y < myPos.y + 20 && bone.y + bone.h > myPos.y) {
                    // 当たったらソウルを赤く点滅させて初期位置に戻す（ペナルティ）
                    myPos = { x: 100, y: 190 };
                    myDiv.style.backgroundColor = "#f00";
                    setTimeout(() => { myDiv.style.backgroundColor = myColor; }, 200);
                }

                // 画面外に出た骨を削除
                if (bone.x < -20) {
                    bone.element.remove();
                    obstacles.splice(index, 1);
                }
            });

            requestAnimationFrame(gameLoop);
        }

        // 骨を生成する関数（上から生える骨、下から生える骨をランダムに）
        function createBone() {
            const bone = document.createElement("div");
            bone.className = "bone";
            
            const isTop = Math.random() > 0.5;
            const height = Math.random() * 150 + 50; // 50px〜200pxのランダムな長さ
            const yPos = isTop ? 0 : (400 - height);

            bone.style.height = height + "px";
            bone.style.top = yPos + "px";
            bone.style.left = "800px";
            stage.appendChild(bone);

            obstacles.push({ element: bone, x: 800, y: yPos, h: height });
        }

        gameLoop();
    </script>
</body>
</html>
